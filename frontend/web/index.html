<!DOCTYPE html>
<html lang="en" data-theme="dark" data-reply-language="">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Miya AI</title>
<link rel="icon" type="image/png" href="/favicon.ico">
<style>
/* ── Reset & Variables ──────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #0f1117;
  --surface:  #1a1d27;
  --surface2: #23263a;
  --border:   #2e3147;
  --text:     #e4e6f0;
  --muted:    #8b8fa3;
  --accent:   #6366f1;
  --accent2:  #818cf8;
  --gradient: linear-gradient(135deg,#6366f1,#a855f7,#ec4899);
  --danger:   #ef4444;
  --success:  #22c55e;
  --radius:   12px;
  --shadow:   0 4px 24px rgba(0,0,0,.35);
  --font:     'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:     'JetBrains Mono','Fira Code',monospace;
  --transition: .2s ease;
}
[data-theme="light"]{
  --bg:       #f5f5f7;
  --surface:  #ffffff;
  --surface2: #f0f0f3;
  --border:   #d1d5db;
  --text:     #1f2937;
  --muted:    #6b7280;
  --shadow:   0 4px 24px rgba(0,0,0,.08);
}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
  transition:background var(--transition),color var(--transition);
}
a{color:var(--accent2)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Header ─────────────────────────────────────────────────────────── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;border-bottom:1px solid var(--border);
  background:var(--surface);backdrop-filter:blur(12px);z-index:10;
}
.logo{font-size:1.35rem;font-weight:700;background:var(--gradient);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-actions{display:flex;gap:10px;align-items:center}
.header-actions button{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);padding:6px 14px;cursor:pointer;font-size:.85rem;
  transition:all var(--transition);
}
.header-actions button:hover{border-color:var(--accent)}
#status-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);
  display:inline-block;margin-right:6px;transition:background var(--transition)}
#status-dot.connected{background:var(--success)}

/* ── Chat Area ──────────────────────────────────────────────────────── */
.chat-wrapper{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:12px;max-width:780px;width:100%;animation:fadeUp .25s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.assistant{align-self:flex-start}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-size:.9rem;font-weight:600}
.msg.user .avatar{background:var(--accent);color:#fff}
.msg.assistant .avatar{background:var(--surface2);color:var(--accent2)}
.bubble{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 18px;line-height:1.65;font-size:.935rem;position:relative;
  word-wrap:break-word;overflow-wrap:break-word;max-width:100%;
}
.msg.user .bubble{background:var(--accent);color:#fff;border-color:transparent}
.bubble pre{
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;overflow-x:auto;margin:8px 0;font-family:var(--mono);font-size:.84rem;
}
.bubble code{font-family:var(--mono);font-size:.88em;background:var(--surface2);
  padding:2px 5px;border-radius:4px}
.bubble pre code{background:none;padding:0}
.meta{font-size:.75rem;color:var(--muted);margin-top:6px;display:flex;gap:12px;flex-wrap:wrap}
.meta span{display:flex;align-items:center;gap:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Typing indicator ───────────────────────────────────────────────── */
.typing{display:flex;gap:4px;padding:4px 0}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* ── Input Area ─────────────────────────────────────────────────────── */
.input-area{
  padding:16px 24px;border-top:1px solid var(--border);
  background:var(--surface);display:flex;gap:10px;align-items:flex-end;
}
.input-area textarea{
  flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);padding:12px 16px;font-size:.93rem;font-family:var(--font);
  resize:none;min-height:46px;max-height:160px;transition:border var(--transition);
  line-height:1.5;
}
.input-area textarea:focus{outline:none;border-color:var(--accent)}
.input-area textarea::placeholder{color:var(--muted)}
.send-btn{
  width:46px;height:46px;border-radius:50%;border:none;
  background:var(--gradient);color:#fff;cursor:pointer;font-size:1.15rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform var(--transition),opacity var(--transition);
}
.send-btn:hover{transform:scale(1.08)}
.send-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.upload-btn{
  width:46px;height:46px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);cursor:pointer;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all var(--transition);
}
.upload-btn:hover{color:var(--accent);border-color:var(--accent)}

/* ── Drop Zone ──────────────────────────────────────────────────────── */
.drop-overlay{
  position:fixed;inset:0;background:rgba(99,102,241,.12);backdrop-filter:blur(4px);
  display:none;z-index:100;align-items:center;justify-content:center;
  border:3px dashed var(--accent);
}
.drop-overlay.active{display:flex}
.drop-overlay p{font-size:1.3rem;color:var(--accent);font-weight:600}

/* ── Responsive ─────────────────────────────────────────────────────── */
@media(max-width:640px){
  .header{padding:10px 14px}
  .chat-wrapper{padding:14px}
  .input-area{padding:12px 14px}
  .msg{max-width:100%}
}
</style>
</head>
<body>

<!-- Drop overlay for file drag-and-drop -->
<div class="drop-overlay" id="drop-overlay"><p>Drop file to upload</p></div>

<!-- Header -->
<header class="header">
  <span class="logo">Miya AI</span>
  <div class="header-actions">
    <span><span id="status-dot"></span><span id="status-text">Disconnected</span></span>
    <button id="btn-new-session">New Session</button>
    <button id="btn-theme">Theme</button>
  </div>
</header>

<!-- Chat Messages -->
<main class="chat-wrapper" id="chat"></main>

<!-- Input -->
<footer class="input-area">
  <label class="upload-btn" title="Attach file">
    &#x1F4CE;
    <input type="file" id="file-input" hidden />
  </label>
  <textarea id="msg-input" rows="1" placeholder="Ask Miya anything …"></textarea>
  <button class="send-btn" id="btn-send" title="Send">&#x27A4;</button>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
